<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Frontend Demo</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
            background: #f5f5f5;
        }

        h1 { color: #333; }
        h2 { color: #555; margin-top: 30px; }

        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        input {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        button {
            padding: 10px 20px;
            margin: 6px 4px 0 0;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover { background: #4338ca; }

        button.secondary {
            background: #6b7280;
        }

        button.danger {
            background: #dc2626;
        }

        pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 16px;
            border-radius: 6px;
            font-size: 13px;
            overflow-x: auto;
            min-height: 60px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .status {
            font-size: 13px;
            color: #6b7280;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<h1>🔐 Auth API Demo</h1>

<div class="card">
    <h2>Login</h2>
    <input id="email" type="email" placeholder="Email" value="ana@example.com">
    <input id="password" type="password" placeholder="Password" value="password123">
    <button onclick="login()">Iniciar Sesión</button>
    <button class="danger" onclick="logout()">Cerrar Sesión</button>
    <p class="status" id="loginStatus"></p>
</div>

<div class="card">
    <h2>Rutas Protegidas</h2>
    <button onclick="getProfile()">GET /profile</button>
    <button class="secondary" onclick="getAdmin()">GET /admin</button>
</div>

<div class="card">
    <h2>Respuesta del Servidor</h2>
    <pre id="result">La respuesta aparecerá aquí...</pre>
</div>

<script src="script.js"></script>
</body>
</html>
